name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          channel: stable
          cache: true

      - name: Resolve mobile dependencies
        run: flutter pub get
        working-directory: apps/mobile

      - name: Check Dart formatting
        run: dart format --output=none --set-exit-if-changed .
        working-directory: apps/mobile

      - name: Analyze mobile application
        run: flutter analyze
        working-directory: apps/mobile

      - name: Test mobile application
        run: flutter test
        working-directory: apps/mobile

      - name: Run provider-neutral extraction benchmark
        run: flutter test benchmark/phase6a_reference_benchmark_test.dart
        working-directory: apps/mobile

      - name: Build release Flutter bundle
        run: flutter build bundle --release
        working-directory: apps/mobile

  backend-and-infrastructure:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      APP_ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://convocoach:convocoach_test@127.0.0.1:5432/convocoach
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: convocoach
          POSTGRES_PASSWORD: convocoach_test
          POSTGRES_USER: convocoach
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U convocoach -d convocoach"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend and development tools
        run: python -m pip install -e "backend[dev]"

      - name: Check Python formatting
        run: ruff format --check backend

      - name: Lint Python
        run: ruff check backend

      - name: Type-check backend
        run: mypy app tests
        working-directory: backend

      - name: Apply and validate PostgreSQL migrations
        run: |
          alembic upgrade head
          alembic check
          alembic downgrade 20260714_0001
          alembic upgrade head
          alembic check
        working-directory: backend

      - name: Test backend and shared tokens
        run: pytest -W error
        working-directory: backend

      - name: Validate Docker Compose
        run: docker compose --env-file .env.example config --quiet
