name: convo_coach
description: Privacy-conscious communication coaching for adult dating users.
publish_to: 'none'
version: 0.2.0+1

environment:
  sdk: ^3.12.2

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  google_mlkit_text_recognition: ^0.16.0
  go_router: ^17.3.0
  crypto: ^3.0.7
  device_info_plus: ^11.5.0
  image: ^4.9.1
  image_picker: ^1.2.3
  intl: ^0.20.2
  super_clipboard: ^0.9.1
  super_drag_and_drop: ^0.9.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  min_sdk_android: 23
  remove_alpha_ios: true
